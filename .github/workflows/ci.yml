name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install .

    - name: Import-check all submodules
      run: |
        python -c "import pkgutil, aicontext; [__import__(m.name) for m in pkgutil.walk_packages(aicontext.__path__, 'aicontext.')]"

    - name: Smoke test CLI entrypoint
      run: |
        aicontext </dev/null

    - name: Smoke test module entrypoint
      run: |
        python -m aicontext.cli </dev/null
